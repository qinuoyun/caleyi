[app]
# 以下项兼容：也可写在文件顶部（无 [app] 时）由 DEFAULT 段提供
app_name   = CALEYI
# possible values: DEBUG, INFO, WARNING, ERROR, FATAL
log_level  = DEBUG
app_port   = 9090
app_sql    = mysql
tenant_id  = qn20250426

[mysql]
ip       =
port     =
user     =
password =
database =

[pgsql]
ip       =
port     =
user     =
password =
database =

[sqlite]
# 数据库文件路径；目录与文件不存在时会自动创建
file = ./runtime/data.db

[redis]
ip   = 127.0.0.1
port = 6379

[whitelist]
items =

[cors]
enable         = false
allow_origins  = *
allow_methods  = GET,POST,PUT,DELETE,PATCH,OPTIONS
allow_headers  = X-Requested-With,Content-Type,Authorization,BusinessId,verify-encrypt,ignoreCancelToken,verify-time,tenant_id
allow_credentials = true
max_age        = 12

[tenant]
auth = true

[license]
# 软件签名授权为框架强制开启（无开关）
# A 端服务地址（不带尾斜杠），例如 http://127.0.0.1:8080
server = http://localhost:9876
# B 端 API Key（Authorization: Bearer <api_key>）
api_key = XigLIFrteX9EZU0CfiKfzJUYOHawEc3T
# 应用标识（必填）
app_id = qn20250426
# 设备名称（可选，默认主机名）
device_name =
# 备注（可选）
remark =
# 本地证书存储路径
store_file = runtime/license.json
# 轮询间隔（秒）
poll_interval_sec = 5
# 轮询超时（秒）
poll_timeout_sec = 600